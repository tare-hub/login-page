<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Register</title>
  <link rel="stylesheet" href="login.css">
 
</head>
<body>

<div class="container" id="container">

  <!-- FORMS SIDE -->
  <div class="forms-side">

    <!-- LOGIN FORM -->
    <form id="loginForm" class="form active-form">
      <h2>Login</h2>
      <div class="input-box">
        <input type="text" id="loginUsername" placeholder="Username" required>
        <i class="fa fa-user"></i>
        <span class="field-error-msg" id="loginUsernameErr"></span>
      </div>
      <div class="input-box">
        <input type="password" id="loginPassword" placeholder="Password" required>
        <i class="fa fa-lock"></i>
        <span class="field-error-msg" id="loginPasswordErr"></span>
      </div>
      <a href="#" class="forgot">Forgot Password</a>
      <button class="action-btn" type="submit">Login</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" class="form">
      <h2>Register</h2>
      <div class="input-box">
        <input type="text" id="regName" placeholder="Full Name" required>
        <i class="fa fa-user"></i>
        <span class="field-error-msg" id="regNameErr"></span>
      </div>
      <div class="input-box">
        <input type="email" id="regEmail" placeholder="Email" required>
        <i class="fa fa-envelope"></i>
        <span class="field-error-msg" id="regEmailErr"></span>
      </div>
      <div class="input-box">
        <input type="password" id="regPassword" placeholder="Password" required>
        <i class="fa fa-lock"></i>
        <span class="field-error-msg" id="regPasswordErr"></span>
      </div>
      <div class="input-box">
        <input type="password" id="regConfirm" placeholder="Confirm Password" required>
        <i class="fa fa-lock"></i>
        <span class="field-error-msg" id="regConfirmErr"></span>
      </div>
      <button class="action-btn" type="submit">Create Account</button>
    </form>

  </div>

  <!-- OVERLAY SIDE -->
  <div class="overlay-side">
    <div class="overlay-panel login-overlay">
      <h1>Hello, Welcome</h1>
      <p>Don't have an account?</p>
      <button id="registerBtn">Register</button>
    </div>
    <div class="overlay-panel register-overlay">
      <h1>Welcome Back</h1>
      <p>Already have an account?</p>
      <button id="loginBtn">Login</button>
    </div>
  </div>

</div>

<script src="login.js"></script>
<div id="toast"></div>
</body>
</html>
